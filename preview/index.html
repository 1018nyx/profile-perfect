<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Profile Perfect Cocos Preview</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="phone" class="phone">
      <section class="topbar">
        <button id="backButton" class="icon-button" aria-label="Levels">‹</button>
        <div class="title-block">
          <label for="levelSelect">PROFILE PERFECT</label>
          <select id="levelSelect"></select>
        </div>
        <button id="checkButton" class="check-button">CHECK</button>
      </section>

      <section id="statusPanel" class="status-panel">
        <div>
          <span id="themeLabel" class="status-kicker">CASE FILE</span>
          <h1 id="levelTitle">Level1</h1>
        </div>
        <div id="progressBadge" class="progress-badge">0/0</div>
      </section>

      <section id="subjects" class="subjects"></section>
      <section id="grid" class="grid"></section>

      <section class="clue-shell">
        <div class="clue-header">
          <h2>Clues</h2>
          <button id="revealButton" class="text-button">Reveal</button>
        </div>
        <div id="clues" class="clues"></div>
      </section>
    </main>

    <section id="levelMap" class="level-map hidden" aria-hidden="true">
      <div class="level-map-card">
        <div class="level-map-header">
          <div>
            <span>CASE ARCHIVE</span>
            <h2>Levels</h2>
          </div>
          <button id="levelMapClose" class="icon-button" aria-label="Close">×</button>
        </div>
        <div id="levelTiles" class="level-tiles"></div>
      </div>
    </section>

    <section id="picker" class="picker hidden" aria-hidden="true">
      <div class="picker-card">
        <div class="picker-header">
          <div>
            <span id="pickerSubject"></span>
            <h3 id="pickerTrait"></h3>
          </div>
          <button id="pickerClose" class="icon-button" aria-label="Close">×</button>
        </div>
        <div id="pickerOptions" class="picker-options"></div>
        <button id="pickerApply" class="primary-button">Apply</button>
      </div>
    </section>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
